name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
        os: [ubuntu-latest]
        include:
          - node: 22
            os: macos-latest
          - node: 22
            os: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # `pnpm build` 는 attw(strict) + publint 를 관문으로 실행한다. attw 가 없으면
      # d.ts 청크 누락 같은 타입 파손이 publint 를 그대로 통과한다.
      - name: Build
        run: pnpm build

      - name: Verify public API is unchanged
        run: pnpm check:api

      - name: Verify tree-shaking
        run: pnpm check:treeshaking

  # peerDependencies 가 `zod ^3 || ^4` 를 광고한다. 광고한 것을 실제로 검증한다.
  zod-compat:
    name: zod v${{ matrix.zod }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        zod: [3, 4]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install zod v${{ matrix.zod }}
        run: pnpm add -D zod@^${{ matrix.zod }}

      - name: Typecheck
        run: pnpm typecheck

      - name: Test schema
        run: pnpm vitest run src/schema

      # 생성된 d.ts 가 zod 메이저에 묶이지 않았는지. `z.ZodEffects` 는 v4 에 없다.
      - name: Build and assert d.ts is zod-version-neutral
        run: |
          pnpm build
          if grep -q "ZodEffects" dist/schema.d.ts dist/schema.d.cts; then
            echo "::error::dist/schema.d.ts 가 zod v3 전용 타입을 하드코딩했습니다."
            exit 1
          fi

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # vitest.config.ts 의 thresholds 가 래칫이다 — 커버리지가 떨어지면 여기서 실패한다.
      - name: Test with coverage
        run: pnpm test:coverage
