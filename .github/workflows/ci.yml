name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# 아래 잡들은 push 하지 않으므로 checkout 이 GITHUB_TOKEN 을 .git/config 에 남기지
# 않게 한다. release.yml 은 changesets 가 push 해야 하므로 자격증명을 유지한다.

jobs:
  # 빌드 도구(tsdown)는 `engines: ^22.18.0 || >=24.11.0` 을 요구한다. 이건 툴체인의
  # 제약이지 배포 산출물의 제약이 아니다. 산출물의 Node 하한은 runtime 잡이 검증한다.
  test:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
        os: [ubuntu-latest]
        include:
          - node: 22
            os: macos-latest
          - node: 22
            os: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # `pnpm build` 는 attw(strict) + publint 를 관문으로 실행한다. attw 가 없으면
      # d.ts 청크 누락 같은 타입 파손이 publint 를 그대로 통과한다.
      - name: Build
        run: pnpm build

      # 트리셰이킹 회귀는 바이트 예산으로 잡는다 (.size-limit.json).
      # PURE 어노테이션이 빠지면 `normalize` 가 500 B → 9.5 kB 로 튄다.
      - name: Size limit
        run: pnpm size

  # `engines.node` 하한이 실제로 성립하는지. 여기서만 Node 20 을 쓴다.
  runtime:
    name: Runtime Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node (build)
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Setup Node ${{ matrix.node }} (run)
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node }}

      # dist 를 직접 실행한다 — vitest 는 src 를 보므로 이 검증을 대신하지 못한다.
      - name: Run dist on Node ${{ matrix.node }}
        run: node scripts/check-runtime.mjs

  # peerDependencies 가 `zod ^3 || ^4` 를 광고한다. 광고한 것을 실제로 검증한다.
  zod-compat:
    name: zod v${{ matrix.zod }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        zod: [3, 4]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install zod v${{ matrix.zod }}
        run: pnpm add -D zod@^${{ matrix.zod }}

      - name: Typecheck
        run: pnpm typecheck

      - name: Test schema
        run: pnpm vitest run src/schema

      # 생성된 d.ts 가 zod 메이저에 묶이지 않았는지. `z.ZodEffects` 는 v4 에 없다.
      - name: Build and assert d.ts is zod-version-neutral
        run: |
          pnpm build
          if grep -q "ZodEffects" dist/schema.d.ts dist/schema.d.cts; then
            echo "::error::dist/schema.d.ts 가 zod v3 전용 타입을 하드코딩했습니다."
            exit 1
          fi

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # vitest.config.ts 의 thresholds 가 래칫이다 — 커버리지가 떨어지면 여기서 실패한다.
      - name: Test with coverage
        run: pnpm test:coverage
