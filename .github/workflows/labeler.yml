name: Labeler

# pull_request_target 은 base 리포의 권한으로 돈다. checkout 을 하지 않으므로
# 포크의 코드가 실행되지 않는다 — 이 조합이어야 안전하다.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# 연속 push 시 라벨 동기화가 경합하지 않도록.
concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: Auto Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
        with:
          sync-labels: true
